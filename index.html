<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神秘のタロット占い🔮</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at center, #1a002f, #000);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow-y: auto;
  position: relative;
}
#stars { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
h1 { font-size: 40px; text-shadow:0 0 20px #b388ff; position: relative; z-index:1; }
input[type="text"] { padding:10px; font-size:18px; border-radius:10px; border:none; margin-top:20px; position:relative; z-index:2; }
button { padding:15px 40px; font-size:20px; border:none; border-radius:30px; background:linear-gradient(45deg,#ff00cc,#3333ff); color:white; cursor:pointer; box-shadow:0 0 20px #ff00cc; transition:0.3s; margin-top:20px; position:relative; z-index:2; }
button:hover { transform:scale(1.1); }
#result { margin:40px auto 20px auto; font-size:24px; position:relative; z-index:2; max-width:90%; }
#cards-container { margin-top:30px; display:flex; justify-content:center; flex-wrap:wrap; gap:20px; }
.card { width:100px; height:150px; background:#333; border-radius:10px; cursor:pointer; perspective:600px; transition:transform 0.6s; position:relative; }
.card-inner { width:100%; height:100%; transition: transform 0.6s; transform-style: preserve-3d; position:relative; }
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-front, .card-back { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:10px; display:flex; align-items:center; justify-content:center; text-align:center; }
.card-front { background:#444; font-size:30px; }
.card-back { transform:rotateY(180deg); background:#222; color:white; padding:10px; flex-direction:column; }
.popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:20px; border-radius:15px; box-shadow:0 0 30px #ff00cc; display:none; z-index:10; max-width:80%; text-align:center; }
.popup.show { display:block; }
.popup button { margin-top:10px; padding:10px 20px; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<h1>🔮 神秘のタロット占い 🔮</h1>
<p>あなたの名前を入力して今日の運勢を占おう！</p>

<input type="text" id="nameInput" placeholder="名前を入力">
<br>
<button id="btnFortune">カードをシャッフル</button>

<div id="result"></div>
<div id="cards-container"></div>

<div class="popup" id="popup">
  <div id="popup-text"></div>
  <button onclick="document.getElementById('popup').classList.remove('show')">閉じる</button>
</div>

<script>
// ========================== 星アニメーション ==========================
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
const stars = [];
for (let i=0;i<100;i++){
  stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+1,dx:(Math.random()-0.5)*0.5,dy:(Math.random()-0.5)*0.5});
}
function animateStars(){
  ctx.clearRect(0,0,w,h);
  for(const s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
    s.x+=s.dx; s.y+=s.dy;
    if(s.x<0)s.x=w;if(s.x>w)s.x=0;if(s.y<0)s.y=h;if(s.y>h)s.y=0;
  }
  requestAnimationFrame(animateStars);
}
animateStars();
window.addEventListener('resize',()=>{ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; });

// ========================== タロット占い ==========================
const results=[
  {title:"💖 恋愛運MAX！素敵な出会いあり", img:"./images/tarot01.jpg", detail:"今日は積極的に行動すると吉。気になる人に声をかけてみよう！"},
  {title:"💔 注意：今日は恋愛は慎重に", img:"./images/tarot02.jpg", detail:"焦らず、冷静に相手の気持ちを観察しよう。"},
  {title:"💞 チャンス到来！勇気を出して", img:"./images/tarot03.jpg", detail:"新しい出会いやチャンスがありそう。勇気を持って！"},
  {title:"💰 金運アップ！臨時収入の予感", img:"./images/tarot04.jpg", detail:"小さな投資や買い物で思わぬ収穫があるかも。"},
  {title:"💸 注意：出費に気をつけて", img:"./images/tarot05.jpg", detail:"衝動買いを避けて計画的に。"},
  {title:"🪙 チャンス到来！投資運あり", img:"./images/tarot06.jpg", detail:"知識を活かして投資や副業に挑戦してみよう。"},
  {title:"⚡ 仕事運好調！効率UP", img:"./images/tarot07.jpg", detail:"今日は効率が上がる日。集中して作業を進めよう。"},
  {title:"🛑 注意：焦らず進めよう", img:"./images/tarot08.jpg", detail:"無理なスケジュールは避け、計画的に行動。"},
  {title:"🔥 チャレンジすると運気上昇！", img:"./images/tarot09.jpg", detail:"新しいことに挑戦すると運気アップ！"}
];

const btn=document.getElementById("btnFortune");
const resultDiv=document.getElementById("result");
const cardsContainer=document.getElementById("cards-container");
const nameInput=document.getElementById("nameInput");
const popup=document.getElementById("popup");
const popupText=document.getElementById("popup-text");

function shuffleArray(array){ return array.sort(()=>Math.random()-0.5); }

btn.addEventListener("click",()=>{
  const name=nameInput.value.trim()||"あなた";
  resultDiv.innerHTML=`${name}さん、カードを選んでください！`;
  cardsContainer.innerHTML="";
  const shuffled=shuffleArray(results).slice(0,3);
  shuffled.forEach((cardData,index)=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-inner">
        <div class="card-front">❓</div>
        <div class="card-back">
          <img src="${cardData.img}" style="width:80px;border-radius:8px"><br>${cardData.title}
        </div>
      </div>
    `;
    card.addEventListener("click",()=>{
      card.classList.add("flipped");
      popupText.innerHTML=`<strong>${cardData.title}</strong><br>${cardData.detail}`;
      popup.classList.add("show");
    });
    cardsContainer.appendChild(card);
  });
});


</script>
</body>
</html>
