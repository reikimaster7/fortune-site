<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神秘の占い🔮</title>
<style>
/* 基本デザイン */
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #1a002f, #000);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow: hidden;
  position: relative;
}

/* 星のキャンバス */
#stars {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

h1 {
  font-size: 40px;
  text-shadow: 0 0 20px #b388ff;
  position: relative;
  z-index: 1;
}

button {
  padding: 15px 40px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff00cc, #3333ff);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px #ff00cc;
  transition: 0.3s;
  margin-top: 20px;
  position: relative;
  z-index: 1;
}

button:hover { transform: scale(1.1); }

#result {
  margin-top: 40px;
  font-size: 28px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
  position: relative;
  z-index: 1;
}

.show {
  opacity: 1 !important;
  transform: translateY(0) !important;
}
</style>
</head>
<body>

<!-- 星背景用キャンバス -->
<canvas id="stars"></canvas>

<h1>🔮 神秘の占い 🔮</h1>
<p>運命を知る準備はいい？</p>

<!-- 占いボタン -->
<button id="btnFortune">運命を占う</button>
<div id="result"></div>

<script>
// ==========================
// 星アニメーション
// ==========================
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
const numStars = 100;
const stars = [];

for (let i = 0; i < numStars; i++) {
  stars.push({
    x: Math.random() * w,
    y: Math.random() * h,
    r: Math.random() * 2 + 1,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}

function animateStars() {
  ctx.clearRect(0,0,w,h);
  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = 'white';
    ctx.fill();
    s.x += s.dx;
    s.y += s.dy;
    if(s.x < 0) s.x = w;
    if(s.x > w) s.x = 0;
    if(s.y < 0) s.y = h;
    if(s.y > h) s.y = 0;
  }
  requestAnimationFrame(animateStars);
}
animateStars();

window.addEventListener('resize', () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

// ==========================
// 占いボタン処理
// ==========================
document.addEventListener("DOMContentLoaded", () => {
  const results = [
    "🌟 大吉：奇跡が起こる予感",
    "💖 恋愛運MAX！素敵な出会いあり",
    "💰 金運アップ！チャンス到来",
    "⚡ 注意：焦りは禁物",
    "🌙 今日は自分を大切に",
    "🔥 挑戦すると運気上昇！"
  ];

  const btn = document.getElementById("btnFortune");
  const resultDiv = document.getElementById("result");

  btn.addEventListener("click", () => {
    const random = Math.floor(Math.random() * results.length);
    resultDiv.textContent = results[random];
    resultDiv.classList.remove("show");
    setTimeout(() => resultDiv.classList.add("show"), 100);
  });
});
</script>
</body>
</html>
